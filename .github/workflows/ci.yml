name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php-version }} / Laravel ${{ matrix.laravel-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - php-version: '8.2'
            laravel-version: '^11.0'
            testbench-version: '^9.0'
          - php-version: '8.3'
            laravel-version: '^11.0'
            testbench-version: '^9.0'
          - php-version: '8.3'
            laravel-version: '^12.0'
            testbench-version: '^10.0'
          - php-version: '8.4'
            laravel-version: '^12.0'
            testbench-version: '^10.0'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Validate Composer
        run: composer validate --strict

      - name: Pin Laravel matrix dependencies
        run: composer require "laravel/framework:${{ matrix.laravel-version }}" "orchestra/testbench:${{ matrix.testbench-version }}" --no-update --no-interaction

      - name: Install dependencies
        run: composer update --no-interaction --no-progress --prefer-dist --with-all-dependencies

      - name: Run tests
        run: composer test

      - name: Check style
        run: composer format -- --test
